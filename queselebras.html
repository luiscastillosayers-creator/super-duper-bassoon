<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="¿Qué Selebras? Cooking Studio — Tortas personalizadas y postres artesanales en Lima, Perú. Cada celebración merece una creación única.">
  <title>¿Qué Selebras? • Cooking Studio | Lima, Perú</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Poppins:wght@300;400;500;600;700&family=Dancing+Script:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
  /* ==============================================
     TOKENS
  ============================================== */
  :root{
    --sky:        #7EC8E3;
    --sky-light:  #C2E8F5;
    --sky-pale:   #EBF6FB;
    --sky-ultra:  #F4FBFD;
    --sky-dark:   #4AAEC8;
    --sky-deep:   #2A90B0;
    --blush:      #FAF1F6;
    --blush-mid:  #F2D5E5;
    --blush-acc:  #E090B0;
    --white:      #FFFFFF;
    --cream:      #FDFCFB;
    --text:       #243040;
    --text-mid:   #3A4F62;
    --muted:      #7A90A0;
    --gold:       #D4A853;
    --gold-light: #EDDDA0;
    --r:          18px;
    --rs:         10px;
    --shadow-s:   0 4px 20px rgba(126,200,227,.18);
    --shadow-m:   0 10px 40px rgba(126,200,227,.22);
    --shadow-l:   0 20px 60px rgba(126,200,227,.28);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Poppins',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden}
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:var(--sky-pale)}
  ::-webkit-scrollbar-thumb{background:var(--sky);border-radius:3px}
  img{display:block;max-width:100%;height:auto}

  /* ==============================================
     TYPOGRAPHY
  ============================================== */
  .t-serif{font-family:'Playfair Display',serif}
  .t-script{font-family:'Dancing Script',cursive}
  .sec-tag{
    display:inline-block;
    font-size:.68rem;letter-spacing:.32em;text-transform:uppercase;
    color:var(--sky-dark);font-weight:700;margin-bottom:12px
  }
  .sec-h{
    font-family:'Playfair Display',serif;
    font-size:clamp(2rem,4.5vw,3.4rem);
    line-height:1.15;color:var(--text);margin-bottom:18px
  }
  .sec-p{font-size:.94rem;color:var(--muted);line-height:1.9;max-width:580px}

  /* ==============================================
     BUTTONS
  ============================================== */
  .btn-sky{
    display:inline-flex;align-items:center;gap:9px;
    background:var(--sky-dark);color:#fff;
    font-family:'Poppins',sans-serif;font-weight:600;font-size:.82rem;
    letter-spacing:.07em;text-transform:uppercase;text-decoration:none;
    padding:15px 34px;border-radius:50px;border:none;cursor:pointer;
    transition:transform .3s,box-shadow .3s,background .3s;
    box-shadow:0 6px 28px rgba(74,174,200,.35)
  }
  .btn-sky:hover{transform:translateY(-3px);box-shadow:0 14px 42px rgba(74,174,200,.48);background:var(--sky-deep)}
  .btn-ghost{
    display:inline-flex;align-items:center;gap:9px;
    background:transparent;color:var(--sky-deep);
    font-family:'Poppins',sans-serif;font-weight:600;font-size:.82rem;
    letter-spacing:.07em;text-transform:uppercase;text-decoration:none;
    padding:14px 32px;border-radius:50px;
    border:2px solid var(--sky-dark);
    transition:background .3s,transform .3s,color .3s
  }
  .btn-ghost:hover{background:var(--sky-dark);color:#fff;transform:translateY(-2px)}
  .btn-ghost-white{
    display:inline-flex;align-items:center;gap:9px;
    background:transparent;color:#fff;
    font-family:'Poppins',sans-serif;font-weight:600;font-size:.82rem;
    letter-spacing:.07em;text-transform:uppercase;text-decoration:none;
    padding:14px 32px;border-radius:50px;
    border:2px solid rgba(255,255,255,.6);
    transition:background .3s,transform .3s
  }
  .btn-ghost-white:hover{background:rgba(255,255,255,.15);transform:translateY(-2px)}

  /* ==============================================
     NAVBAR
  ============================================== */
  .navbar{
    position:fixed;top:0;left:0;right:0;z-index:1000;
    padding:22px 0;transition:background .4s,padding .4s,box-shadow .4s
  }
  .navbar.scrolled{
    background:rgba(255,255,255,.96);backdrop-filter:blur(20px);
    padding:12px 0;box-shadow:0 2px 32px rgba(126,200,227,.18)
  }
  .nav-inner{max-width:1200px;margin:0 auto;padding:0 28px;display:flex;align-items:center;justify-content:space-between}
  .nav-logo{text-decoration:none;display:flex;flex-direction:column;line-height:1.1}
  .nav-logo .script{
    font-family:'Dancing Script',cursive;font-size:1.85rem;font-weight:700;
    color:var(--text);transition:color .4s
  }
  .navbar:not(.scrolled) .nav-logo .script{color:var(--text)}
  .nav-logo .sub{font-size:.54rem;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);font-weight:500}
  .nav-links{display:flex;list-style:none;gap:36px}
  .nav-links a{
    text-decoration:none;color:var(--text-mid);
    font-size:.76rem;font-weight:500;letter-spacing:.07em;text-transform:uppercase;
    transition:color .3s;position:relative
  }
  .nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:2px;background:var(--sky-dark);transition:width .3s}
  .nav-links a:hover{color:var(--sky-dark)}
  .nav-links a:hover::after{width:100%}
  .nav-cta{
    background:var(--sky-dark);color:#fff;text-decoration:none;
    font-size:.74rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
    padding:10px 22px;border-radius:50px;
    transition:background .3s,transform .3s,box-shadow .3s;
    box-shadow:0 4px 16px rgba(74,174,200,.3)
  }
  .nav-cta:hover{background:var(--sky-deep);transform:translateY(-2px)}
  .hamburger{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px}
  .hamburger span{display:block;width:24px;height:2px;background:var(--text);border-radius:2px}
  .drawer{display:none;position:fixed;inset:0;background:#fff;z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:32px}
  .drawer.open{display:flex}
  .drawer-x{position:absolute;top:24px;right:28px;background:none;border:none;font-size:2rem;cursor:pointer;color:var(--muted)}
  .drawer a{
    text-decoration:none;font-family:'Playfair Display',serif;
    font-size:2.4rem;font-style:italic;color:var(--text);transition:color .3s
  }
  .drawer a:hover{color:var(--sky-dark)}

  /* ==============================================
     HERO — split layout
  ============================================== */
  .hero{
    min-height:100vh;padding:120px 28px 0;
    background:linear-gradient(150deg,var(--sky-ultra) 0%,var(--white) 55%,var(--blush) 100%);
    position:relative;overflow:hidden;
    display:flex;align-items:center
  }
  /* decorative blobs */
  .hero-blob{position:absolute;border-radius:50%;filter:blur(70px);pointer-events:none}
  .hb1{width:520px;height:520px;background:rgba(126,200,227,.22);top:-10%;right:-5%;animation:blobDrift 11s ease-in-out infinite alternate}
  .hb2{width:380px;height:380px;background:rgba(242,213,229,.3);bottom:-8%;left:-6%;animation:blobDrift 9s ease-in-out infinite alternate;animation-delay:-4s}
  .hb3{width:260px;height:260px;background:rgba(126,200,227,.15);bottom:20%;right:35%;animation:blobDrift 13s ease-in-out infinite alternate;animation-delay:-7s}
  @keyframes blobDrift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(24px,16px) scale(1.06)}}

  /* floating dots */
  .hero-dot{
    position:absolute;border-radius:50%;pointer-events:none;
    animation:dotFloat 6s ease-in-out infinite alternate
  }
  @keyframes dotFloat{0%{transform:translateY(0)}100%{transform:translateY(-14px)}}

  .hero-inner{
    max-width:1200px;margin:0 auto;width:100%;
    display:grid;grid-template-columns:1fr 1fr;
    gap:60px;align-items:center;padding-bottom:80px
  }
  .hero-text{position:relative;z-index:2}
  .hero-label{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--sky-pale);color:var(--sky-deep);
    font-size:.72rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
    padding:8px 20px;border-radius:50px;margin-bottom:24px;
    border:1px solid var(--sky-light);
    opacity:0;transform:translateY(18px);animation:fadeUp .8s ease .2s forwards
  }
  .hero-script{
    font-family:'Dancing Script',cursive;font-size:clamp(2.2rem,4vw,3.2rem);
    font-weight:700;color:var(--sky-dark);line-height:1;
    opacity:0;transform:translateY(20px);animation:fadeUp .8s ease .4s forwards
  }
  .hero-h1{
    font-family:'Playfair Display',serif;
    font-size:clamp(3.5rem,7vw,6rem);font-weight:900;
    line-height:.95;color:var(--text);margin-bottom:8px;
    opacity:0;transform:translateY(24px);animation:fadeUp .8s ease .55s forwards
  }
  .hero-h1 em{color:var(--sky-dark);font-style:italic}
  .hero-divider{
    display:flex;align-items:center;gap:12px;margin:24px 0;
    opacity:0;animation:fadeUp .8s ease .7s forwards
  }
  .hero-divider::before,.hero-divider::after{
    content:'';flex:1;max-width:80px;height:1.5px;
    background:linear-gradient(90deg,var(--sky-light),transparent)
  }
  .hero-divider::before{background:linear-gradient(90deg,transparent,var(--sky-light))}
  .hero-divider span{font-size:1.2rem}
  .hero-p{
    font-size:clamp(.92rem,1.8vw,1.08rem);font-weight:300;
    line-height:1.9;color:var(--muted);
    max-width:460px;margin-bottom:40px;
    opacity:0;transform:translateY(20px);animation:fadeUp .8s ease .85s forwards
  }
  .hero-ctas{
    display:flex;gap:14px;flex-wrap:wrap;
    opacity:0;transform:translateY(20px);animation:fadeUp .8s ease 1s forwards
  }

  /* Hero right — featured image */
  .hero-visual{
    position:relative;z-index:2;
    opacity:0;transform:scale(.94) translateY(16px);
    animation:fadeUp .9s ease .5s forwards
  }
  .hero-img-frame{
    position:relative;
    border-radius:40% 60% 55% 45% / 45% 40% 60% 55%;
    overflow:hidden;aspect-ratio:1;
    background:var(--sky-light);
    box-shadow:var(--shadow-l);
    border:6px solid var(--white)
  }
  .hero-img-frame img{
    width:100%;height:100%;object-fit:cover;
    transition:transform .6s ease
  }
  .hero-img-frame:hover img{transform:scale(1.04)}
  .hero-badge{
    position:absolute;bottom:-8px;left:-8px;
    background:#fff;border-radius:var(--r);
    padding:16px 20px;box-shadow:var(--shadow-m);
    display:flex;align-items:center;gap:12px;
    border:1px solid var(--sky-light)
  }
  .hero-badge-icon{font-size:1.8rem}
  .hero-badge-text strong{display:block;font-size:.78rem;font-weight:700;color:var(--text)}
  .hero-badge-text span{font-size:.68rem;color:var(--muted)}
  .hero-tag{
    position:absolute;top:12px;right:-10px;
    background:var(--sky-dark);color:#fff;
    font-family:'Dancing Script',cursive;font-size:1.1rem;font-weight:700;
    padding:8px 20px;border-radius:50px;
    box-shadow:0 4px 16px rgba(74,174,200,.4)
  }

  /* Stats strip */
  .hero-stats{
    position:relative;z-index:2;
    background:var(--white);
    border-top:1px solid var(--sky-pale);
    border-bottom:none;
    box-shadow:0 -4px 30px rgba(126,200,227,.1)
  }
  .stats-inner{
    max-width:1200px;margin:0 auto;
    display:flex;justify-content:center;flex-wrap:wrap
  }
  .h-stat{
    padding:22px 52px;text-align:center;
    border-right:1px solid var(--sky-pale);
    opacity:0;animation:fadeUp .8s ease 1.2s forwards
  }
  .h-stat:last-child{border-right:none}
  .h-stat-n{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--sky-dark);line-height:1}
  .h-stat-l{font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:5px}

  @keyframes fadeUp{to{opacity:1;transform:translateY(0) scale(1)}}

  /* ==============================================
     SHARED LAYOUT
  ============================================== */
  .section{padding:104px 24px}
  .container{max-width:1180px;margin:0 auto}
  .sec-head{text-align:center;margin-bottom:72px}
  .sec-head .sec-p{margin:0 auto}

  /* ==============================================
     SOBRE SOFÍA
  ============================================== */
  .s-story{background:var(--white);padding:104px 24px}
  .story-grid{
    display:grid;grid-template-columns:1fr 1.1fr;gap:72px;
    align-items:center;max-width:1100px;margin:0 auto
  }
  .story-visual{position:relative}
  .story-mosaic{
    display:grid;grid-template-columns:1fr 1fr;
    grid-template-rows:220px 220px;gap:14px
  }
  .mosaic-main{
    grid-row:1/3;border-radius:var(--r);overflow:hidden;
    box-shadow:var(--shadow-m);background:var(--sky-pale)
  }
  .mosaic-main img{width:100%;height:100%;object-fit:cover}
  .mosaic-sm{border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow-s);background:var(--sky-pale)}
  .mosaic-sm img{width:100%;height:100%;object-fit:cover}
  .story-badge-float{
    position:absolute;bottom:-18px;right:-18px;z-index:2;
    width:110px;height:110px;border-radius:50%;
    background:linear-gradient(135deg,var(--sky-dark),var(--sky-deep));
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:#fff;text-align:center;box-shadow:var(--shadow-m);border:5px solid #fff
  }
  .sbnf{font-family:'Dancing Script',cursive;font-size:1.2rem;font-weight:700;line-height:1.1}
  .sblf{font-size:.54rem;letter-spacing:.1em;text-transform:uppercase;opacity:.8;margin-top:2px}
  .story-text .sec-tag{display:block}
  .story-cordon{
    display:inline-flex;align-items:center;gap:10px;
    background:var(--sky-pale);color:var(--sky-deep);
    font-size:.8rem;font-weight:700;padding:10px 22px;border-radius:50px;
    border:1.5px solid var(--sky-light);margin-bottom:24px
  }
  .story-pills{display:flex;flex-wrap:wrap;gap:10px;margin-top:28px}
  .pill{
    display:inline-flex;align-items:center;gap:7px;
    background:var(--sky-pale);color:var(--sky-deep);
    font-size:.78rem;font-weight:600;padding:8px 18px;border-radius:50px;
    border:1.5px solid var(--sky-light)
  }

  /* ==============================================
     CREACIONES — Tabbed
  ============================================== */
  .s-creaciones{
    background:linear-gradient(180deg,var(--sky-ultra) 0%,var(--white) 100%);
    padding:104px 24px
  }
  .cat-tabs{
    display:flex;gap:0;background:var(--sky-pale);
    border-radius:50px;padding:5px;margin:0 auto 56px;
    max-width:680px;flex-wrap:wrap;justify-content:center;
    box-shadow:inset 0 2px 8px rgba(126,200,227,.15)
  }
  .cat-tab{
    flex:1;min-width:130px;background:none;border:none;cursor:pointer;
    color:var(--muted);font-family:'Poppins',sans-serif;font-size:.76rem;
    font-weight:600;letter-spacing:.05em;text-transform:uppercase;
    padding:12px 18px;border-radius:50px;transition:background .3s,color .3s,box-shadow .3s
  }
  .cat-tab.active{background:#fff;color:var(--sky-deep);box-shadow:var(--shadow-s)}
  .cat-panel{display:none}
  .cat-panel.active{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:28px}

  .prod-card{
    background:#fff;border-radius:var(--r);
    border:1.5px solid var(--sky-pale);
    overflow:hidden;transition:transform .35s,box-shadow .35s
  }
  .prod-card:hover{transform:translateY(-7px);box-shadow:var(--shadow-l)}
  .prod-img{
    aspect-ratio:1;overflow:hidden;position:relative;
    background:var(--sky-pale)
  }
  .prod-img img{
    width:100%;height:100%;object-fit:cover;
    transition:transform .5s ease
  }
  .prod-card:hover .prod-img img{transform:scale(1.07)}
  .prod-img-placeholder{
    width:100%;height:100%;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:12px;color:var(--muted)
  }
  .prod-img-placeholder span:first-child{font-size:3rem}
  .prod-img-placeholder span:last-child{font-size:.72rem;letter-spacing:.15em;text-transform:uppercase}
  .prod-info{padding:24px}
  .prod-name{
    font-family:'Playfair Display',serif;font-size:1.15rem;
    font-weight:700;color:var(--text);margin-bottom:8px
  }
  .prod-desc{font-size:.82rem;color:var(--muted);line-height:1.75;margin-bottom:16px}
  .prod-cta{
    display:flex;align-items:center;justify-content:center;gap:8px;
    background:var(--sky-pale);color:var(--sky-deep);
    font-size:.76rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    text-decoration:none;padding:10px;border-radius:var(--rs);
    border:1.5px solid var(--sky-light);transition:background .3s,color .3s
  }
  .prod-cta:hover{background:var(--sky-dark);color:#fff}

  /* ==============================================
     GALERÍA
  ============================================== */
  .s-gallery{background:var(--blush);padding:104px 24px}
  .gallery-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:260px 260px;
    gap:16px;max-width:1100px;margin:0 auto
  }
  .g-cell{
    border-radius:var(--r);overflow:hidden;position:relative;
    background:var(--sky-pale);cursor:pointer;
    transition:transform .4s,box-shadow .4s
  }
  .g-cell:hover{transform:scale(1.025);box-shadow:0 20px 52px rgba(74,174,200,.25),0 0 0 3px var(--sky)}
  .g-cell img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease;display:block}
  .g-cell:hover img{transform:scale(1.06)}
  .g-cell:first-child{grid-row:1/3}

  /* ==============================================
     POR QUÉ ELEGIRNOS
  ============================================== */
  .s-why{
    background:linear-gradient(135deg,var(--sky-dark) 0%,var(--sky-deep) 100%);
    padding:104px 24px
  }
  .s-why .sec-tag{color:var(--sky-light)}
  .s-why .sec-h{color:#fff}
  .s-why .sec-p{color:rgba(255,255,255,.6)}
  .why-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:24px;max-width:1100px;margin:0 auto}
  .why-card{
    background:rgba(255,255,255,.12);border-radius:var(--r);
    padding:36px 28px;border:1.5px solid rgba(255,255,255,.2);
    transition:transform .35s,background .35s,box-shadow .35s;
    backdrop-filter:blur(8px)
  }
  .why-card:hover{transform:translateY(-8px);background:rgba(255,255,255,.2);box-shadow:0 20px 52px rgba(0,0,0,.12)}
  .why-icon{font-size:2.6rem;margin-bottom:20px}
  .why-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:12px}
  .why-text{font-size:.84rem;color:rgba(255,255,255,.7);line-height:1.8}

  /* ==============================================
     CÓMO ORDENAR
  ============================================== */
  .s-order{background:#fff;padding:104px 24px}
  .order-steps{
    display:grid;grid-template-columns:repeat(3,1fr);
    gap:0;max-width:900px;margin:0 auto;position:relative
  }
  .order-steps::before{
    content:'';position:absolute;top:50px;left:16.6%;right:16.6%;
    height:1.5px;background:linear-gradient(90deg,var(--sky-light),var(--sky),var(--sky-light));
    z-index:0
  }
  .order-step{text-align:center;padding:0 24px;position:relative;z-index:1}
  .step-num{
    width:100px;height:100px;border-radius:50%;
    background:linear-gradient(135deg,var(--sky),var(--sky-dark));
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 26px;box-shadow:var(--shadow-m);
    border:5px solid #fff
  }
  .step-num span{font-family:'Playfair Display',serif;font-size:2.1rem;font-weight:900;color:#fff}
  .step-title{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--text);margin-bottom:12px}
  .step-text{font-size:.84rem;color:var(--muted);line-height:1.85}
  .order-cta{text-align:center;margin-top:60px}

  /* ==============================================
     CONTACTO
  ============================================== */
  .s-contact{
    background:linear-gradient(160deg,var(--sky-pale) 0%,var(--white) 100%);
    padding:104px 24px
  }
  .contact-grid{
    display:grid;grid-template-columns:1.2fr 1fr;
    gap:72px;max-width:1100px;margin:0 auto
  }
  .contact-form{display:flex;flex-direction:column;gap:16px}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .form-field{display:flex;flex-direction:column;gap:7px}
  .form-field label{font-size:.74rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-mid)}
  .form-field input,.form-field select,.form-field textarea{
    background:#fff;border:1.5px solid var(--sky-light);
    border-radius:var(--rs);padding:13px 16px;
    color:var(--text);font-family:'Poppins',sans-serif;font-size:.9rem;
    transition:border-color .3s,box-shadow .3s;resize:none;outline:none
  }
  .form-field input::placeholder,.form-field textarea::placeholder{color:var(--muted)}
  .form-field input:focus,.form-field select:focus,.form-field textarea:focus{
    border-color:var(--sky-dark);box-shadow:0 0 0 4px rgba(126,200,227,.15)
  }
  .form-field select option{color:var(--text)}
  .contact-info-block{display:flex;flex-direction:column;gap:32px;padding-top:6px}
  .c-info-item{display:flex;align-items:flex-start;gap:18px}
  .c-info-icon{
    width:52px;height:52px;min-width:52px;border-radius:14px;
    background:var(--sky-pale);border:1.5px solid var(--sky-light);
    display:flex;align-items:center;justify-content:center;font-size:1.4rem
  }
  .c-info-text strong{display:block;font-size:.74rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--sky-deep);margin-bottom:5px}
  .c-info-text span{font-size:.9rem;color:var(--muted);line-height:1.65}
  .social-strip{display:flex;gap:12px;margin-top:36px}
  .soc-btn{
    display:inline-flex;align-items:center;gap:9px;
    background:var(--sky-pale);color:var(--sky-deep);
    text-decoration:none;font-size:.78rem;font-weight:700;
    padding:10px 20px;border-radius:50px;border:1.5px solid var(--sky-light);
    transition:background .3s,transform .3s,box-shadow .3s
  }
  .soc-btn:hover{background:var(--sky-dark);color:#fff;transform:translateY(-2px);box-shadow:var(--shadow-s)}

  /* ==============================================
     FOOTER
  ============================================== */
  .footer-bottom{
    background:var(--text);padding:30px 24px;text-align:center
  }
  .footer-bottom p{font-size:.78rem;color:rgba(255,255,255,.35)}
  .footer-bottom span{color:var(--sky)}

  /* ==============================================
     WHATSAPP FLOAT
  ============================================== */
  .wa-float{
    position:fixed;bottom:30px;right:30px;z-index:999;
    width:60px;height:60px;border-radius:50%;
    background:#25D366;display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 28px rgba(37,211,102,.45);text-decoration:none;font-size:1.75rem;
    transition:transform .3s,box-shadow .3s
  }
  .wa-float:hover{transform:scale(1.1) translateY(-4px);box-shadow:0 12px 40px rgba(37,211,102,.6)}
  .wa-pulse{
    position:absolute;inset:0;border-radius:50%;
    background:rgba(37,211,102,.4);animation:waPulse 2.3s ease-out infinite
  }
  @keyframes waPulse{0%{transform:scale(1);opacity:.7}100%{transform:scale(2);opacity:0}}

  /* ==============================================
     SCROLL REVEAL
  ============================================== */
  .rv{opacity:0;transform:translateY(32px);transition:opacity .7s ease,transform .7s ease}
  .rv-l{opacity:0;transform:translateX(-40px);transition:opacity .7s ease,transform .7s ease}
  .rv-r{opacity:0;transform:translateX(40px);transition:opacity .7s ease,transform .7s ease}
  .rv-s{opacity:0;transform:scale(.94);transition:opacity .7s ease,transform .7s ease}
  .rv.in,.rv-l.in,.rv-r.in,.rv-s.in{opacity:1;transform:none}
  [data-delay="1"]{transition-delay:.1s}
  [data-delay="2"]{transition-delay:.22s}
  [data-delay="3"]{transition-delay:.34s}
  [data-delay="4"]{transition-delay:.46s}
  [data-delay="5"]{transition-delay:.58s}
  [data-delay="6"]{transition-delay:.7s}

  /* ==============================================
     RESPONSIVE
  ============================================== */
  @media(max-width:960px){
    .nav-links,.nav-cta{display:none}
    .hamburger{display:flex}
    .hero-inner{grid-template-columns:1fr;gap:48px;text-align:center}
    .hero-ctas{justify-content:center}
    .hero-visual{max-width:400px;margin:0 auto}
    .story-grid{grid-template-columns:1fr;gap:48px}
    .story-mosaic{max-width:480px;margin:0 auto}
    .contact-grid{grid-template-columns:1fr;gap:48px}
    .gallery-grid{grid-template-columns:repeat(2,1fr);grid-template-rows:auto}
    .g-cell:first-child{grid-row:auto;grid-column:auto}
    .order-steps{grid-template-columns:1fr;gap:40px}
    .order-steps::before{display:none}
    .form-row{grid-template-columns:1fr}
  }
  @media(max-width:768px){
    .section,.s-story,.s-creaciones,.s-gallery,.s-why,.s-order,.s-contact{padding:88px 20px}
    .h-stat{padding:18px 28px}
    .story-mosaic{grid-template-rows:190px 190px}
    .gallery-grid{grid-template-columns:repeat(2,1fr);gap:12px}
    .contact-grid{gap:36px}
    .sec-head{margin-bottom:52px}
    .hero-h1{font-size:clamp(2.8rem,6vw,4rem)}
  }
  @media(max-width:580px){
    .section,.s-story,.s-creaciones,.s-gallery,.s-why,.s-order,.s-contact{padding:72px 18px}
    .h-stat{padding:16px 24px}
    .hero-stats{flex-wrap:wrap}
    .gallery-grid{grid-template-columns:1fr;grid-template-rows:auto}
    .cat-tabs{flex-direction:column;border-radius:var(--r)}
    .cat-tab{border-radius:var(--rs)}
    .hero-img-frame{border-radius:24px}
  }
  </style>
